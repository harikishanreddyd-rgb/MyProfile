<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- Theme Toggle Button -->
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>

        <div class="profile-card">
            <div class="profile-header">
                <!-- Placeholder image from Unsplash -->
                <img src="MyProfile.jpg" alt="Profile Image" class="profile-img">
            </div>
            
            <div class="profile-body">
                <h1 class="name">Hari Kishan Duggempudi</h1>
                <p class="role">Senior Data Architect</p>
                <p class="bio">
                    Passionate about designing and building scalable data solutions. With over two decades of experience in the industry, I specialize in data architecture, cloud computing.
                </p>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="count">20</span>
                        <span class="label">Years</span>
                    </div>
                    <div class="stat-item">
                        <span class="count">0</span>
                        <span class="label">Followers</span>
                    </div>
                    <div class="stat-item">
                        <span class="count">0</span>
                        <span class="label">Awards</span>
                    </div>
                </div>

                <div class="social-links">
                    <a href="https://github.com/harikishanreddyd-rgb" class="social-btn"><i class="fab fa-github"></i></a>
                    <a href="https://www.linkedin.com/in/harikishan-duggempudi" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
                    <a href="mailto:harikishanreddy.d@gmail.com" class="social-btn"><i class="fas fa-envelope"></i></a>
                </div>

                <button class="contact-btn">Contact Me</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
